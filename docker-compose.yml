# ⚠ WARNING: `docker compose down -v` DESTROYS the pgdata volume and all
# database contents (photos, embeddings, scores). Use `docker compose down`
# (without -v) to stop services safely. Back up first: ./scripts/backup.sh
#
# See .env.example for the variables this file expects.

services:
  db:
    # pgvector/pgvector:pg15 is the drop-in for postgres:15 with the `vector`
    # extension preinstalled — required by the CLIP embedding column on the
    # photos table. pgdata volume carries over cleanly since the underlying
    # Postgres version is unchanged.
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: photo_curator_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d photo_curator_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  orchestrator:
    # Profile-gated: only starts on `docker compose --profile compose up`
    # (i.e. via `make compose`). Bare `docker compose up -d` (called by
    # `make dev`) starts only the `db` service, so native dev doesn't
    # collide with a containerised orchestrator on port 4000.
    profiles: ["compose"]
    build: ./orchestrator
    depends_on:
      db:
        condition: service_healthy
      ai_worker:
        condition: service_started
    environment:
      DATABASE_URL: ecto://postgres:postgres_password@db:5432/photo_curator_dev
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env — run `make compose-init` to generate one}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SCHEME: http
      PHX_URL_PORT: "4000"
      PORT: "4000"
      AI_WORKER_URL: http://ai_worker:8000
      # Read by the LiveView's `default_chips/0` to surface each drive as
      # a clickable chip in the gallery's Directory field. Empty in
      # single-drive mode (the `/photos` chip covers it instead).
      PHOTO_LIBRARIES: ${PHOTO_LIBRARIES:-}
    # Boot sequence:
    #   1. setup-uploads-symlink — reconciles the release-priv path Phoenix
    #      reads from with the /app/priv/static/uploads bind-mount the user
    #      sees on disk, so old + new ingests land in one place.
    #   2. migrate — runs any pending Ecto migrations idempotently.
    #   3. server — starts Phoenix.
    # All three scripts come from rel/overlays/bin/ in the release layout.
    command:
      ["sh", "-c", "/app/bin/setup-uploads-symlink && /app/bin/migrate && /app/bin/server"]
    ports:
      - "4000:4000"
    volumes:
      # Shared with ai_worker so the orchestrator can write converted JPEGs
      # at a path the worker can read back. If UPLOADS_DIR is unset, this
      # resolves to the `uploads` named volume below; if set to a host path
      # (e.g. ./data/uploads or /Users/you/fineshyt-cache), it's a bind-mount
      # and you can browse the converted JPEGs directly from your file
      # manager.
      - ${UPLOADS_DIR:-uploads}:/app/priv/static/uploads
      # User's photo library. Read-only — fineshyt never mutates source files.
      - ${PHOTO_LIBRARY:?Set PHOTO_LIBRARY in .env — see .env.example}:/photos:ro

  ai_worker:
    # Profile-gated for the same reason as `orchestrator` above — keeps
    # native dev's port 8000 free for the locally-run FastAPI.
    profiles: ["compose"]
    build: ./ai_worker
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1/}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llava}
      STATIC_UPLOADS_DIR: /app/priv/static/uploads
    ports:
      - "8000:8000"
    volumes:
      - ${UPLOADS_DIR:-uploads}:/app/priv/static/uploads
      - ${PHOTO_LIBRARY:?Set PHOTO_LIBRARY in .env — see .env.example}:/photos:ro
      # CLIP model + HF cache. ~2GB on first run; persist so re-creating the
      # container doesn't re-download.
      - models:/cache
      # Pickled Ridge preference model.
      - preference:/root/.fineshyt
    extra_hosts:
      # Gives the container `host.docker.internal` on Linux too, so a single
      # LLM_BASE_URL works across macOS/Windows/Linux for an Ollama running
      # on the host.
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  uploads:
  models:
  preference:
